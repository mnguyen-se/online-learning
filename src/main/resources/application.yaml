spring:
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Ho_Chi_Minh

  data:
    redis:
      host: localhost
      port: 6379
  cloudinary:
    cloud-name: ${CLOUDINARY_CLOUD_NAME}
    api-key: ${CLOUDINARY_API_KEY}
    api-secret: ${CLOUDINARY_API_SECRET}


  servlet:
    multipart:
      max-file-size: 200MB
      max-request-size: 200MB


  output:
    ansi:
      enabled: always

  application:
    name: online_learning

  datasource:
    url: ${DB_URL}?useSSL=true&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver


    hikari:
        maximum-pool-size: 10
        minimum-idle: 5
        idle-timeout: 300000
        max-lifetime: 1800000
        connection-timeout: 30000

#      -----------DATABASE LOCAL-------------############
#    url: jdbc:mysql://localhost:3305/online_learning?useSSL=false&serverTimezone=UTC
#    username: root
#    password: 12345
#    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    database-platform: org.hibernate.dialect.MySQLDialect
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${EMAIL_USERNAME}
    password: ${EMAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

logging:
  level:
    org.hibernate.SQL: DEBUG
    org.hibernate.tool.schema: DEBUG
    org.springframework.security: DEBUG

# =======================
# GEMINI AI CONFIG
# =======================
gemini:
  api-key: ${GEMINI_API_KEY}
  model: gemini-flash-latest
  base-url: https://generativelanguage.googleapis.com/v1beta/models/

  timeout: 30s
  max-tokens: 2048
  temperature: 0.7

# =======================
# AI PROMPT VERSIONING (optional nhưng rất nên có)
# =======================
ai:
  prompt:
    exercise-version: v1.0
    assistant-version: v1.0