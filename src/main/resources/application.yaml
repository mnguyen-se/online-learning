spring:
  application:
    name: online_learning

  datasource:
    url: ${DB_URL:jdbc:h2:mem:testdb}
    username: ${DB_USERNAME:sa}
    password: ${DB_PASSWORD:}
    driver-class-name: ${DB_DRIVER:org.h2.Driver}
    ##-----------DATABASE LOCAL-------------############
    #      url: jdbc:mysql://localhost:3306/online_learning
    #        ?useSSL=false
    #        &allowPublicKeyRetrieval=true
    #        &serverTimezone=Asia/Ho_Chi_Minh
    #        username: root
    #        password: 123456
    #        driver-class-name: com.mysql.cj.jdbc.Driver


  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  servlet:
    multipart:
      max-file-size: 200MB
      max-request-size: 200MB

  output:
    ansi:
      enabled: always

  cloudinary:
    cloud-name: ${CLOUDINARY_CLOUD_NAME:test}
    api-key: ${CLOUDINARY_API_KEY:test}
    api-secret: ${CLOUDINARY_API_SECRET:test}

logging:
  level:
    org.hibernate.SQL: DEBUG
    org.springframework.security: DEBUG

# =======================
# GEMINI AI CONFIG
# =======================
gemini:
  api-key: ${GEMINI_API_KEY:test}
  model: gemini-flash-latest
  base-url: https://generativelanguage.googleapis.com/v1beta/models/
  timeout: 30s
  max-tokens: 2048
  temperature: 0.7

# =======================
# AI PROMPT VERSIONING
# =======================
ai:
  prompt:
    exercise-version: v1.0
    assistant-version: v1.0
