spring:
  spring:
    data:
      redis:
        host: localhost
        port: 6379
        url: ${REDIS_URL}
  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop
    database-platform: org.hibernate.dialect.H2Dialect

  flyway:
    enabled: false
  liquibase:
    enabled: false
