name: Java CI/CD

on:
  push:
    branches: [ "dev-be-main" ]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout source code
        uses: actions/checkout@v4

      - name: ☕ Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: 🔨 Build & Test
        run: mvn clean test

  send_email:
    needs: build-test
    if: always()
    runs-on: ubuntu-latest

    steps:
      - name: 📧 Send CI/CD result email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "CI/CD Result: ${{ needs.build-test.result }}"
          body: |
            Hello,

            The Java CI/CD pipeline has finished.

            🔎 Result: ${{ needs.build-test.result }}

            Repository: ${{ github.repository }}
            Branch: ${{ github.ref_name }}
            Commit: ${{ github.sha }}

            Please check details at:
            GitHub → Actions → Workflow run

            Regards,  
            GitHub Actions 🤖
          to: nguyennmse184571@fpt.edu.vn
          from: GitHub CI/CD <minhnguyen08112004@gmail.com>
