spring:
  output:
    ansi:
      enabled: always
  application:
    name: online_learning

  datasource:
    url: jdbc:mysql://localhost:3305/online_learning?useSSL=false&serverTimezone=UTC
    username: root
    password: 12345
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

logging:
  level:
    org.hibernate.SQL: DEBUG
    org.hibernate.tool.schema: DEBUG
    org.springframework.security: DEBUG